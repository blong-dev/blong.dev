<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>World Power Graph — blong.dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="An interactive slice of a public-data knowledge graph — money, lobbying, control, and contracts between real entities.">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/force-graph@1"></script>
  <style>
    body{overflow:hidden;}
    #pg-wrap{position:relative;height:calc(100vh - 57px);width:100%;background:var(--obsidian);}
    #graph{position:absolute;inset:0;}
    .pg-overlay{position:absolute;top:0;left:0;max-width:min(92vw,380px);padding:18px 20px;pointer-events:none;z-index:5;}
    .pg-overlay h1{font-family:'Courier New',monospace;color:var(--gold);font-size:1.25rem;margin:0 0 6px;letter-spacing:1px;}
    .pg-overlay p{color:var(--parchment-dim);font-size:.8rem;line-height:1.5;margin:0 0 12px;}
    #pg-search{pointer-events:auto;width:100%;max-width:300px;padding:8px 11px;border:1px solid var(--line);
      border-radius:6px;background:var(--obsidian-2);color:var(--parchment);font-family:'Courier New',monospace;font-size:14px;}
    #pg-search::placeholder{color:var(--parchment-dim);}
    .pg-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:12px;}
    .pg-legend span{display:flex;align-items:center;gap:5px;font-family:'Courier New',monospace;font-size:.66rem;color:var(--parchment-dim);text-transform:capitalize;}
    .pg-legend i{width:9px;height:9px;border-radius:50%;display:block;}
    .pg-disclaimer{margin-top:16px;max-width:320px;color:var(--parchment-dim);opacity:.7;
      font-family:'Courier New',monospace;font-size:.6rem;line-height:1.5;}
    .pg-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:var(--parchment-dim);font-family:'Courier New',monospace;font-size:.9rem;z-index:4;}

    /* detail pop-up — right slide-in, site palette/font */
    #pg-panel{position:absolute;top:0;right:0;bottom:0;width:min(94vw,380px);z-index:20;
      background:rgba(20,20,27,.97);border-left:1px solid var(--gold);backdrop-filter:blur(8px);
      overflow-y:auto;transform:translateX(100%);transition:transform .28s ease;font-family:'Courier New',monospace;}
    #pg-panel.open{transform:translateX(0);}
    #pg-panel .pclose{position:absolute;top:10px;right:10px;width:26px;height:26px;border:none;border-radius:5px;
      background:#2a2a36;color:var(--parchment);cursor:pointer;font-size:16px;line-height:1;z-index:2;}
    #pg-panel .pclose:hover{background:var(--red);color:#fff;}
    .phead{padding:18px 20px 14px;border-bottom:1px solid var(--line);}
    .pbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.62rem;font-weight:bold;
      letter-spacing:1px;text-transform:uppercase;color:#14141b;margin-right:7px;}
    .ptype{color:var(--parchment-dim);font-size:.7rem;letter-spacing:.5px;text-transform:uppercase;}
    .pname{color:var(--parchment);font-size:1.2rem;margin:9px 24px 4px 0;word-break:break-word;}
    .pdesc{color:var(--parchment-dim);font-size:.8rem;line-height:1.45;margin:6px 0 0;}
    .psec{padding:13px 20px;border-bottom:1px solid var(--line);}
    .psec h3{color:var(--parchment-dim);font-size:.66rem;font-weight:normal;text-transform:uppercase;letter-spacing:1px;margin:0 0 9px;}
    .pmetrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .pmetrics .ml{color:var(--parchment-dim);font-size:.64rem;text-transform:uppercase;letter-spacing:.5px;}
    .pmetrics .mv{color:var(--parchment);font-size:1rem;}
    .prel{margin-bottom:11px;}
    .prelh{color:var(--parchment);font-size:.72rem;letter-spacing:.5px;padding-left:8px;border-left:2px solid var(--gold);margin-bottom:4px;}
    .pflow{display:flex;align-items:center;gap:8px;width:100%;padding:4px 6px 4px 12px;border:none;background:none;
      cursor:pointer;text-align:left;font-family:inherit;font-size:.8rem;color:var(--parchment);border-radius:5px;}
    .pflow:hover{background:var(--obsidian-2);}
    .pflow i{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .pflow .fn{flex:1;color:var(--parchment);}
    .pflow .fa{color:#7fc99a;font-size:.72rem;}
    .pexpand{margin:16px 20px;width:calc(100% - 40px);padding:9px 14px;background:var(--obsidian-2);
      border:1px solid var(--gold);border-radius:7px;color:var(--gold);font-family:inherit;font-size:.8rem;cursor:pointer;letter-spacing:.5px;}
    .pexpand:hover{background:var(--gold);color:var(--obsidian);}
    .pexpand:disabled{opacity:.45;cursor:default;border-color:var(--line);color:var(--parchment-dim);background:none;}
    @media(max-width:560px){ .pg-overlay h1{font-size:1.05rem;} .pg-overlay p{display:none;} .pg-disclaimer{display:none;} }
  </style>
</head>
<body>
  <div id="pg-wrap">
    <div id="graph"></div>
    <div class="pg-loading" id="pg-loading">loading the graph…</div>
    <div class="pg-overlay">
      <h1>World Power Graph</h1>
      <p id="pg-cap">The most-connected entities in a public-data knowledge graph. Click a node to pull in its neighbors · drag · scroll to zoom.</p>
      <input id="pg-search" type="search" placeholder="Search an entity…  (Enter)">
      <div class="pg-legend" id="pg-legend"></div>
      <div class="pg-disclaimer">An independent interpretation of public documents, for demonstration only. Nothing here constitutes a legal claim.</div>
    </div>
    <div id="pg-panel"><button class="pclose" aria-label="close">×</button><div id="pg-body"></div></div>
  </div>

  <script>
  (function () {
    var COLORS = { organization:'#6f9bd1', gov_body:'#6fb37a', person:'#e0b34e', institution:'#5bb1b0',
                   fund:'#b18fd1', agency:'#e0764e', business:'#9a93a8', other:'#8a8a8a' };
    var LABELS = { organization:'Organization', gov_body:'Gov body', person:'Person', institution:'Institution',
                   fund:'Fund', agency:'Agency', business:'Business' };
    var LINK_RGB = '150,140,110';
    var color = function (t) { return COLORS[t] || COLORS.other; };
    function lighten(hex, a) { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return 'rgb('+Math.min(255,r+a*255)+','+Math.min(255,g+a*255)+','+Math.min(255,b+a*255)+')'; }
    function fmtAmt(n){ if(n>=1e9)return (n/1e9).toFixed(1)+'B'; if(n>=1e6)return (n/1e6).toFixed(1)+'M';
      if(n>=1e3)return (n/1e3).toFixed(0)+'K'; return ''+Math.round(n); }
    function esc(s){ return (s+'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

    fetch('/assets/powergraph.json').then(function (r) { return r.json(); }).then(function (data) {
      document.getElementById('pg-loading').style.display = 'none';

      // sizing — mirror the operator map: __size = 2 + sqrt(normDegree) * 18, drawn at __size/scale
      var degs = data.nodes.map(function (n) { return n.d || 0; });
      var maxD = Math.max.apply(null, degs.concat([1]));
      var pos = degs.filter(function (d) { return d > 0; });
      var minD = pos.length ? Math.min.apply(null, pos) : 0;
      data.nodes.forEach(function (n) {
        var norm = maxD > minD ? ((n.d || 0) - minD) / (maxD - minD) : 0.5;
        n.__size = 2 + Math.sqrt(Math.max(0, norm)) * 18;
      });

      // legend (types present)
      var present = {}; data.nodes.forEach(function (n) { present[n.t] = 1; });
      var leg = document.getElementById('pg-legend');
      Object.keys(LABELS).forEach(function (t) { if (!present[t]) return;
        var s = document.createElement('span'); s.innerHTML = '<i style="background:' + color(t) + '"></i>' + LABELS[t]; leg.appendChild(s); });

      // index + adjacency (full snapshot)
      var byId = {}; data.nodes.forEach(function (n) { byId[n.id] = n; });
      var adj = {};
      data.links.forEach(function (l) {
        (adj[l.s] = adj[l.s] || []).push({ o: l.t, r: l.r, a: l.a });
        (adj[l.t] = adj[l.t] || []).push({ o: l.s, r: l.r, a: l.a });
      });

      // start with a seed: the top ~45 by degree; expand reveals neighbors from the snapshot
      // seed = the densely-interconnected core: a big top-by-degree pool, keep only
      // nodes with >=2 edges to other seed nodes (lone pendants get revealed on expand).
      var topIds = new Set([].concat(data.nodes).sort(function (a, b) { return b.d - a.d; }).slice(0, 240).map(function (n) { return n.id; }));
      var inDeg = {};
      data.links.forEach(function (l) { if (topIds.has(l.s) && topIds.has(l.t)) { inDeg[l.s] = (inDeg[l.s] || 0) + 1; inDeg[l.t] = (inDeg[l.t] || 0) + 1; } });
      var visible = new Set();
      topIds.forEach(function (id) { if ((inDeg[id] || 0) >= 2) visible.add(id); });
      var expanded = new Set();

      var selectedId = null, hoveredId = null, hoverNb = null;
      var el = document.getElementById('graph');

      var Graph = ForceGraph()(el)
        .backgroundColor('#14141b')
        .nodeId('id')
        .warmupTicks(80).cooldownTicks(300).cooldownTime(8000)
        .d3AlphaDecay(0.03).d3AlphaMin(0.005).d3VelocityDecay(0.5)
        .nodeLabel(function (n) { return n.n + '  ·  ' + (LABELS[n.t] || n.t); })
        .onNodeHover(function (n) {
          hoveredId = n ? n.id : null;
          if (n) { hoverNb = new Set([n.id]); (adj[n.id] || []).forEach(function (e) { hoverNb.add(e.o); }); }
          else hoverNb = null;
          el.style.cursor = n ? 'pointer' : '';
        })
        .onNodeClick(function (n) { selectedId = n.id; expand(n.id); openPanel(n.id); Graph.centerAt(n.x, n.y, 600); })
        .onBackgroundClick(function () { selectedId = null; closePanel(); })
        .nodeCanvasObject(function (node, ctx, scale) {
          var size = (node.__size || 6) / scale;
          var col = color(node.t), isSel = node.id === selectedId, isHov = node.id === hoveredId;
          var dimmed = hoverNb && !hoverNb.has(node.id);
          ctx.globalAlpha = dimmed ? 0.12 : 1;
          ctx.beginPath(); ctx.arc(node.x, node.y, isHov ? size * 1.3 : size, 0, 2 * Math.PI);
          ctx.fillStyle = isHov ? lighten(col, 0.3) : col; ctx.fill();
          if (isSel) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 / scale; ctx.stroke(); }
          if (isHov || isSel || (!dimmed && scale > 0.8)) {
            var lbl = node.n.length > 24 ? node.n.slice(0, 22) + '…' : node.n;
            var fs = Math.max(isHov ? 12 : 10, 3) / scale;
            ctx.font = (isHov ? 'bold ' : '') + fs + "px 'Courier New', monospace";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillStyle = isHov ? '#fff' : 'rgba(233,223,198,0.72)';
            ctx.fillText(lbl, node.x, node.y + size + 2 / scale);
          }
          ctx.globalAlpha = 1;
        })
        .nodePointerAreaPaint(function (node, c, ctx, scale) {
          var size = ((node.__size || 6) + 4) / scale;
          ctx.fillStyle = c; ctx.beginPath(); ctx.arc(node.x, node.y, size, 0, 2 * Math.PI); ctx.fill();
        })
        .linkCanvasObject(function (link, ctx, scale) {
          var s = link.source, t = link.target; if (!s || !t || s.x == null) return;
          var dimmed = hoverNb && !hoverNb.has(s.id) && !hoverNb.has(t.id);
          var hi = hoverNb && (s.id === hoveredId || t.id === hoveredId);
          var base = Math.max(0.15, (link.cf || 0.5) * 0.6);
          var op = dimmed ? 0.03 : hi ? Math.min(1, base * 2) : base;
          ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = 'rgba(' + LINK_RGB + ',' + op + ')'; ctx.lineWidth = (hi ? 2 : 1) / scale; ctx.stroke();
          if (!dimmed) {
            var ang = Math.atan2(t.y - s.y, t.x - s.x), al = (hi ? 6 : 4) / scale, ts = (t.__size || 6) / scale;
            var ax = t.x - Math.cos(ang) * ts, ay = t.y - Math.sin(ang) * ts;
            ctx.beginPath(); ctx.moveTo(ax, ay);
            ctx.lineTo(ax - al * Math.cos(ang - Math.PI / 6), ay - al * Math.sin(ang - Math.PI / 6));
            ctx.lineTo(ax - al * Math.cos(ang + Math.PI / 6), ay - al * Math.sin(ang + Math.PI / 6));
            ctx.closePath(); ctx.fillStyle = 'rgba(' + LINK_RGB + ',' + op + ')'; ctx.fill();
          }
        });

      Graph.d3Force('charge').strength(-30);
      Graph.d3Force('link').distance(40);

      var fitDone = false;
      Graph.onEngineStop(function () { if (!fitDone) { Graph.zoomToFit(500, 60); fitDone = true; } });

      function render() {
        var ns = data.nodes.filter(function (n) { return visible.has(n.id); });
        var ls = [];
        data.links.forEach(function (l) { if (visible.has(l.s) && visible.has(l.t)) ls.push({ source: l.s, target: l.t, cf: l.cf }); });
        Graph.graphData({ nodes: ns, links: ls });
      }
      render();

      // expand: reveal a node's neighbors from the snapshot, spawned near it (physics pushes them out)
      function expand(id) {
        if (expanded.has(id)) return;
        expanded.add(id);
        var center = byId[id];
        (adj[id] || []).forEach(function (e) {
          if (!visible.has(e.o)) {
            var nb = byId[e.o];
            if (nb && nb.x == null && center && center.x != null) { nb.x = center.x + (Math.random() - 0.5) * 8; nb.y = center.y + (Math.random() - 0.5) * 8; }
            visible.add(e.o);
          }
        });
        render();
        refreshExpandBtn(id);
      }

      function reveal(id) { if (!visible.has(id)) { visible.add(id); render(); } }

      function openPanel(id) {
        var n = byId[id]; if (!n) return;
        var flows = adj[id] || [];
        var groups = {};
        flows.forEach(function (f) { (groups[f.r] = groups[f.r] || []).push(f); });
        var relOrder = Object.keys(groups).sort(function (a, b) { return groups[b].length - groups[a].length; });
        var conns = flows.length;

        var h = '';
        h += '<div class="phead">' +
               '<span class="pbadge" style="background:' + color(n.t) + '">' + (LABELS[n.t] || n.t) + '</span>' +
               '<span class="ptype">' + esc(n.t) + '</span>' +
               '<div class="pname">' + esc(n.n) + '</div>' +
               (n.desc ? '<p class="pdesc">' + esc(n.desc) + '</p>' : '') +
             '</div>';
        h += '<div class="psec"><h3>Metrics</h3><div class="pmetrics">' +
               metric('Connections', conns) +
               (n.pr != null ? metric('PageRank', Number(n.pr).toFixed(3)) : '') +
               (n.c != null ? metric('Confidence', Math.round(n.c * 100) + '%') : '') +
             '</div></div>';
        if (relOrder.length) {
          h += '<div class="psec"><h3>Power flows (' + conns + ')</h3>';
          relOrder.forEach(function (rel) {
            h += '<div class="prel"><div class="prelh">' + esc(rel.replace(/_/g, ' ')) + ' (' + groups[rel].length + ')</div>';
            groups[rel].slice(0, 40).forEach(function (f) {
              var tgt = byId[f.o]; if (!tgt) return;
              h += '<button class="pflow" data-go="' + f.o + '">' +
                     '<i style="background:' + color(tgt.t) + '"></i>' +
                     '<span class="fn">' + esc(tgt.n) + '</span>' +
                     (f.a ? '<span class="fa">$' + fmtAmt(f.a) + '</span>' : '') +
                   '</button>';
            });
            h += '</div>';
          });
          h += '</div>';
        }
        h += '<button class="pexpand" id="pg-expand">' + (expanded.has(id) ? 'Neighborhood expanded' : 'Expand neighborhood') + '</button>';

        document.getElementById('pg-body').innerHTML = h;
        document.getElementById('pg-panel').classList.add('open');
        var eb = document.getElementById('pg-expand');
        eb.disabled = expanded.has(id);
        eb.onclick = function () { expand(id); };
        Array.prototype.forEach.call(document.querySelectorAll('.pflow'), function (b) {
          b.onclick = function () { var go = b.getAttribute('data-go'); reveal(go); selectedId = go;
            var t = byId[go]; if (t && t.x != null) Graph.centerAt(t.x, t.y, 600); openPanel(go); };
        });
      }
      function metric(l, v) { return '<div><div class="ml">' + l + '</div><div class="mv">' + v + '</div></div>'; }
      function refreshExpandBtn(id) { var eb = document.getElementById('pg-expand'); if (eb && selectedId === id) { eb.textContent = 'Neighborhood expanded'; eb.disabled = true; } }
      function closePanel() { document.getElementById('pg-panel').classList.remove('open'); }
      document.querySelector('#pg-panel .pclose').onclick = function () { selectedId = null; closePanel(); };

      var search = document.getElementById('pg-search');
      search.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        var q = search.value.trim().toLowerCase(); if (q.length < 2) return;
        var hit = data.nodes.find(function (n) { return n.n.toLowerCase().indexOf(q) >= 0; });
        if (hit) { reveal(hit.id); selectedId = hit.id; expand(hit.id); openPanel(hit.id);
          setTimeout(function () { if (hit.x != null) { Graph.centerAt(hit.x, hit.y, 700); Graph.zoom(2, 700); } }, 60); }
      });

      addEventListener('resize', function () { Graph.width(el.clientWidth).height(el.clientHeight); });
    }).catch(function () { document.getElementById('pg-loading').textContent = 'could not load the graph.'; });
  })();
  </script>
</body>
</html>
